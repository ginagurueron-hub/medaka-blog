name: 毎週自動記事投稿

on:
  schedule:
    - cron: '0 0 * * 1'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate-and-post:
    runs-on: ubuntu-latest

    steps:
      - name: リポジトリをチェックアウト
        uses: actions/checkout@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Python セットアップ
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: 必要パッケージをインストール
        run: pip install anthropic

      - name: 記事を自動生成（1本目）
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python generate_article.py

      - name: 記事を自動生成（2本目）
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python generate_article.py

      - name: Gitコミット & プッシュ
        run: |
          git config user.name "AutoBot"
          git config user.email "bot@auto.com"
          git add _posts/
          git commit -m "🤖 自動記事追加: $(date '+%Y-%m-%d')" || echo "変更なし"
          git push
